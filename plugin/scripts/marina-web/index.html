<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marina</title>
  <meta name="marina-build" content="{{MARINA_BUILD}}" />
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <header>
    <h1>Marina <span class="brand-sub">dev sessions</span></h1>
    <div class="toolbar">
      <div class="mem" id="mem" hidden title="dev = marina 추적 서비스의 RSS 합 / 시스템 = OS 전체 사용량(브라우저·IDE 등 모든 앱 포함, memory_pressure 기준이라 활동 모니터 수치와 다를 수 있음). 가용 4GB 미만이면 적색 + 서비스 시작 차단"><span id="memText"></span><span class="mem-bar"><i id="memBar"></i></span></div>
      <select id="themeSelect" title="대시보드 테마 — 시스템은 OS 다크/라이트 실시간 추종">
        <option value="system">시스템</option>
        <option value="light">라이트</option>
        <option value="dark">다크</option>
      </select>
      <button id="refresh" title="새로고침 — 세션·디스크 분석(du) 전체 재계산">↻</button>
    </div>
  </header>
  <div class="update-banner" id="updateBanner" hidden></div>
  <main>
    <aside>
      <div class="sessions-bar">
        <div class="switcher" id="switcher">
          <button id="switcherToggle" class="switcher-toggle" title="프로젝트 전환">
            <span id="switcherCurrent" class="switcher-current">프로젝트</span>
            <span class="switcher-chev">▾</span>
          </button>
          <div id="switcherMenu" class="switcher-menu" hidden></div>
        </div>
        <button id="collapseAll" title="세션 카드 전체 접기/펼치기">⇈</button>
      </div>
      <div class="sessions" id="sessions"></div>
    </aside>
    <div class="rail"><button id="asideToggle" title="세션 패널 좌우 접기/펼치기 (로그 전체 화면)">◀</button></div>
    <section>
      <div class="log-head">
        <div class="log-src">
          <div class="log-title">
            <div class="log-kicker" id="selectedRoot">서비스 선택</div>
            <div class="log-name" id="selectedLabel">Logs</div>
          </div>
          <div class="log-src-tools">
            <div class="segments" id="logModeTabs">
              <button data-log-mode="service" class="active" title="서비스 프로세스의 서버 로그">Server</button>
              <button data-log-mode="console" title="브라우저 콘솔 수집 로그 (대시보드로 띄운 web 에서 전송)">Console</button>
            </div>
            <select id="runSelect" title="로그 run 선택 — 재시작마다 새 run 파일 (최신 10개 유지)"></select>
          </div>
        </div>
        <div class="log-toolbar">
          <span class="search-ic" aria-hidden="true">⌕</span>
          <input id="logFilter" placeholder="필터 — 파일 전체에서 찾기" />
          <button id="logErrOnly" title="에러·경고 라인만 표시 — 게이지에 위치 틱이 찍힘">에러만</button>
          <span class="match-count" id="matchCount"></span>
          <div class="log-actions">
            <button id="followLog" class="follow-btn active" title="Follow — 로그 하단 자동 추적 (스크롤 올리면 해제, 과거 탐색 중 누르면 최신으로 복귀)">⤓</button>
            <button id="logClear" title="화면만 비움 (파일 로그는 유지)">⌫</button>
            <button id="logDownload" title="로그 파일 전체 다운로드 (민감값 마스킹 적용)">↓</button>
            <button id="openWeb" hidden title="이 세션의 web 을 브라우저로 열기">↗</button>
          </div>
        </div>
      </div>
      <div class="gauge-bar" id="olderBar" hidden>
        <span class="gauge-note" id="olderInfo"></span>
        <div class="gauge-track" id="gaugeTrack" title="파일 전체에서 현재 보는 구간 — 클릭하면 그 위치로 이동, 빨간 틱 = 매치">
          <div class="gauge-window" id="gaugeWindow"></div>
        </div>
        <span class="gauge-note" id="gaugePos"></span>
      </div>
      <div class="log-body" id="log"><div class="empty">서비스 행을 선택하세요</div></div>
    </section>
  </main>
  <div class="modal-backdrop" id="registerBackdrop" hidden>
    <div class="register-panel" id="registerPanel">
      <div class="register-head">
        <span class="register-title" id="registerTitle">프로젝트 등록</span>
        <button id="registerClose" title="닫기">✕</button>
      </div>
      <div class="register-entry" id="registerEntry" hidden style="display:flex;flex-direction:column;gap:10px;margin-top:6px">
        <div style="font-size:13px;color:var(--muted)">프로젝트를 어떻게 설정할까요?</div>
        <button id="entryWizard" class="register-confirm" title="처음 만드는 사람 — 스캔·파일·연결을 단계별로 채웁니다">🆕 새로 설정 (위저드)</button>
        <button id="entryPaste" class="register-confirm" style="background:var(--sys-cont-neutral-light,#e5e7eb);color:var(--text,#111)" title="팀원이 공유한 compose+x-marina 블록을 붙여넣어 한 번에 재현">📋 팀원 설정 붙여넣기</button>
      </div>
      <div class="register-paste" id="registerPaste" hidden style="display:flex;flex-direction:column;gap:8px;margin-top:6px">
        <label class="register-label">프로젝트 경로</label>
        <div class="register-path-row">
          <input id="pastePath" class="register-input" placeholder="~/path/to/project" />
          <button id="pasteBrowse" title="폴더 탐색">찾아보기</button>
        </div>
        <label class="register-label">공유 블록 (compose + x-marina)<span class="help-q" title="팀원이 [공유용 복사] 로 준 한 블록을 그대로 붙여넣으세요. compose 서비스 + x-marina(links·prebuild·forward·gateway) 가 한 번에 등록·적용됩니다. 시크릿(.env 값)은 각자 본인 것을 채우세요.">?</span></label>
        <textarea id="pasteBlob" spellcheck="false" style="min-height:200px;font-family:ui-monospace,Menlo,monospace;white-space:pre" placeholder="services:&#10;  app:&#10;    build: .&#10;x-marina:&#10;  links: { symlink: [node_modules] }"></textarea>
        <label class="register-check" style="font-size:12px"><input type="checkbox" id="pasteApply" checked /> 가져온 뒤 바로 시작</label>
        <div class="register-error" id="pasteError" hidden></div>
        <button id="pasteImport" class="register-confirm" title="공유 블록을 검증(compose 유효·레포 매칭)한 뒤 등록 + 전체 설정 적용">가져오기 → 끝</button>
      </div>
      <div class="register-wizard" id="registerWizard" hidden style="display:flex;flex-direction:column;gap:10px;margin-top:6px">
        <div class="wiz-steps" id="wizSteps" style="display:flex;gap:6px;font-size:12px"></div>
        <div class="register-error" id="wizError" hidden></div>
        <div class="wiz-body" id="wizBody" style="min-height:220px;max-height:52vh;overflow:auto"></div>
        <div class="wiz-nav" style="display:flex;align-items:center;gap:8px">
          <button id="wizPrev" type="button">← 이전</button>
          <button id="wizAdvanced" type="button" title="같은 설정을 raw compose YAML 로 직접 편집(파워유저)" style="background:var(--sys-cont-neutral-light,#e5e7eb);color:var(--text,#111)">고급 (YAML)</button>
          <span style="flex:1"></span>
          <button id="wizNext" type="button" class="register-confirm" style="margin:0">다음 →</button>
        </div>
      </div>
      <label class="register-label" id="registerPathLabel">프로젝트 경로</label>
      <div class="register-path-row" id="registerPathRow">
        <input id="registerPath" class="register-input" placeholder="~/path/to/project" />
        <button id="registerBrowse" title="폴더 탐색">찾아보기</button>
        <button id="registerInfer">분석</button>
      </div>
      <div class="register-error" id="registerError" hidden></div>
      <div class="browse-panel" id="browsePanel" hidden>
        <div class="browse-bar"><span class="browse-path" id="browsePath"></span><button id="browseSelect" title="이 폴더 선택">이 폴더 선택</button></div>
        <div class="browse-list" id="browseList"></div>
      </div>
      <div class="register-preview" id="registerPreview" hidden>
        <div class="register-meta" id="registerMeta"></div>
        <div class="register-checklist-head">서브레포 <span class="register-hint">(체크된 것만 등록)</span></div>
        <div class="register-checklist" id="registerChecklist"></div>
        <div class="register-manual">
          <input id="registerManualPath" class="register-input" placeholder="추가 subrepo 상대경로 (예: projects/react-skeleton)" />
          <button id="registerManualBrowse" title="프로젝트 안에서 폴더 선택">찾아보기</button>
          <button id="registerManualAdd">+ 추가</button>
        </div>
        <button id="registerConfirm" class="register-confirm">등록</button>
      </div>
      <!-- 작업공간: 왼쪽 rail(컨트롤 스크롤 + sticky 검증후등록) · 오른쪽 compose 에디터(세로 풀높이) -->
      <div class="compose-section" id="composeSection" hidden>
        <div class="compose-rail">
          <div class="compose-rail-scroll">
            <div id="composeSubrepos" hidden style="display:flex;flex-direction:column;gap:5px"></div>
            <div class="compose-hint">compose 채우기<span class="help-q" title="이 프로젝트를 Docker compose 로 worktree마다 격리 실행하려면 docker-compose.yml 한 개가 필요합니다. 오른쪽 에디터가 그 본체이고, 등록하면 marina 에만 저장돼요(앱 레포는 안 건드림).">?</span></div>
            <div class="compose-fill-row">
              <button class="svc-llm-go" id="composeImport" type="button" title="프로젝트 폴더(하위 1단계까지)에서 기존 docker-compose 파일을 자동으로 찾아 목록으로 보여줍니다. 클릭하면 에디터로 불러와요.">📁 레포에서 찾기</button>
              <span>· 오른쪽에 직접 작성</span>
            </div>
            <div class="svc-llm-progress" id="composeProgress" hidden></div>
            <div class="browse-list" id="composeDetectList" hidden style="max-height:140px"></div>
          </div>
          <button id="composeConfirm" class="register-confirm compose-footer-btn" title="docker compose config·격리·Dockerfile 을 자동 검증한 뒤 등록(편집이면 저장)합니다. 문제가 있으면 등록하지 않고 알려줘요.">검증 후 등록</button>
        </div>
        <div class="svc-modal-field compose-editor">
          <div class="compose-editor-head">
            <label for="composeYaml">docker-compose.yml<span class="help-q" title="등록하면 이 내용이 marina 에만 저장됩니다(~/.marina 안 — 앱 레포는 안 건드림). env 는 compose 표준대로 environment: / env_file: / ${VAR}, 시크릿은 env_file: .env (gitignore).">?</span></label>
            <button class="svc-llm-go" id="composeViewConfig" type="button" title="이미 등록·저장된 compose 의 해석된 구성 보기 — 서비스별 빌드 컨텍스트·Dockerfile·포트·env (읽기전용). 신규 등록 중에는 아직 저장본이 없어 안 보입니다.">📄 저장된 구성 보기</button>
          </div>
          <div class="yaml-wrap">
            <div class="yaml-gutter" id="composeGutter" aria-hidden="true">1</div>
            <pre class="yaml-hl" id="composeHl" aria-hidden="true"></pre>
            <textarea id="composeYaml" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="services:&#10;  web:&#10;    build: ./web&#10;    environment: { APP_ENV: local }"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>
  <datalist id="profileSuggest"><option value="local"></option><option value="dev"></option><option value="prod"></option><option value="staging"></option></datalist>
  <script src="/web/app-1-core.js"></script>
  <script src="/web/app-2-register.js"></script>
  <script src="/web/app-3-util.js"></script>
  <script src="/web/app-4-logs.js"></script>
  <script src="/web/app-5-sessions.js"></script>
  <script src="/web/app-6-modals.js"></script>
  <script src="/web/app-7-init.js"></script>
</body>
</html>
